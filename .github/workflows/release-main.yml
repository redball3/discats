name: Release on main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next release tag
        id: version
        shell: bash
        run: |
          set -euo pipefail

          latest_tag="$(
            git tag --sort=-version:refname \
              | grep -E '^v?[0-9]+\.[0-9]+\.[0-9]+$' \
              | head -n 1
          )"

          if [ -z "$latest_tag" ]; then
            next_tag="v0.0.1"
          else
            version="${latest_tag#v}"
            IFS='.' read -r major minor patch <<<"$version"
            next_tag="v${major}.${minor}.$((patch + 1))"
          fi

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"

      - name: Skip if commit already tagged
        id: tagged
        shell: bash
        run: |
          set -euo pipefail

          if git tag --points-at HEAD | grep -Eq '^v?[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        if: steps.tagged.outputs.already_tagged == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const tag = '${{ steps.version.outputs.next_tag }}';
            const { owner, repo } = context.repo;

            await github.rest.git.createRef({
              owner,
              repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha,
            });

            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              target_commitish: context.sha,
              name: tag,
              generate_release_notes: true,
            });
